services:
  api: 
    build: .
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://postgres:hasnain@localhost:5432/quick_cart
      - BASE_URL=http://localhost:5000
      - FRONTEND_URL=http://localhost:5173
      - CLOUDINARY_CLOUD_NAME=di6zqorpf
      - CLOUDINARY_API_KEY=714176993132482
      - CLOUDINARY_API_SECRET=1F7T2N03NwgscbdxgS2HO8Gaiys

  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
  
  postgres:
    image: postgres:17
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=hasnain
      - POSTGRES_DB=quick_cart
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:

